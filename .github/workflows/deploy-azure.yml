name: Deploy to Azure Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: rubix-staking
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env for build
        run: |
          echo "VITE_TOKEN_MINT=${{ secrets.VITE_TOKEN_MINT }}" > .env
          echo "VITE_STAKING_VAULT=${{ secrets.VITE_STAKING_VAULT }}" >> .env
          echo "VITE_TOKEN_SYMBOL=${{ secrets.VITE_TOKEN_SYMBOL }}" >> .env
          echo "VITE_TOKEN_DECIMALS=${{ secrets.VITE_TOKEN_DECIMALS }}" >> .env
          echo "VITE_SOLANA_RPC=${{ secrets.VITE_SOLANA_RPC }}" >> .env

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
