# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - Rubix

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build client and server
        env:
          VITE_TOKEN_MINT: ${{ secrets.VITE_TOKEN_MINT }}
          VITE_STAKING_VAULT: ${{ secrets.VITE_STAKING_VAULT }}
          VITE_TOKEN_SYMBOL: ${{ secrets.VITE_TOKEN_SYMBOL }}
          VITE_TOKEN_DECIMALS: ${{ secrets.VITE_TOKEN_DECIMALS }}
          VITE_SOLANA_RPC: ${{ secrets.VITE_SOLANA_RPC }}
        run: npm run build

      - name: Remove devDependencies
        run: npm prune --omit=dev

      - name: Zip artifact for deployment
        run: zip -r release.zip dist/ server-dist/ node_modules/ package.json package-lock.json

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact
        run: unzip release.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Rubix'
          slot-name: 'Production'
          package: .
