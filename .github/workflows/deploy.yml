name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: test-4194c
  REGION: asia-south1
  SERVICE: rubix-staking

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Create .env for build
        run: |
          cat > .env << 'ENVEOF'
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_TOKEN_MINT=${{ secrets.VITE_TOKEN_MINT }}
          VITE_STAKING_VAULT=${{ secrets.VITE_STAKING_VAULT }}
          VITE_TOKEN_SYMBOL=${{ secrets.VITE_TOKEN_SYMBOL }}
          VITE_TOKEN_DECIMALS=${{ secrets.VITE_TOKEN_DECIMALS }}
          VITE_SOLANA_RPC=${{ secrets.VITE_SOLANA_RPC }}
          ENVEOF
          echo "--- .env created ---"
          cat .env

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --source . \
            --region $REGION \
            --project $PROJECT_ID \
            --allow-unauthenticated \
            --port 8080 \
            --quiet

      - name: Show URL
        run: |
          URL=$(gcloud run services describe $SERVICE --region $REGION --project $PROJECT_ID --format="value(status.url)")
          echo "Deployed to: $URL"
