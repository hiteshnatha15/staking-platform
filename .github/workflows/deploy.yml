name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: test-4194c
  REGION: asia-south1
  SERVICE: rubix-staking

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Create .env for build
        run: |
          echo "VITE_TOKEN_MINT=${{ secrets.VITE_TOKEN_MINT }}" > .env
          echo "VITE_STAKING_VAULT=${{ secrets.VITE_STAKING_VAULT }}" >> .env
          echo "VITE_TOKEN_SYMBOL=${{ secrets.VITE_TOKEN_SYMBOL }}" >> .env
          echo "VITE_TOKEN_DECIMALS=${{ secrets.VITE_TOKEN_DECIMALS }}" >> .env
          echo "VITE_SOLANA_RPC=${{ secrets.VITE_SOLANA_RPC }}" >> .env
          echo "--- .env created ---"
          cat .env

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --source . \
            --region $REGION \
            --project $PROJECT_ID \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars "MONGODB_URI=${{ secrets.MONGODB_URI }},ADMIN_USER=${{ secrets.ADMIN_USER }},ADMIN_PASS=${{ secrets.ADMIN_PASS }},ADMIN_JWT_SECRET=${{ secrets.ADMIN_JWT_SECRET }}" \
            --quiet

      - name: Show URL
        run: |
          URL=$(gcloud run services describe $SERVICE --region $REGION --project $PROJECT_ID --format="value(status.url)")
          echo "Deployed to: $URL"
